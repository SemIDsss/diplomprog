version: '3.8'

services:
  postgres_server:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: dev_db
    ports:
      - "5433:5432" # Изменили внешний порт на 5433
    volumes:
      - pgdata3:/var/lib/postgresql/data

volumes:
  pgdata3:
